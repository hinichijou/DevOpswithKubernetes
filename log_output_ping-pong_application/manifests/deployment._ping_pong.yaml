apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: exercises
  name: pingpongapp-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pingpongapp
  template:
    metadata:
      labels:
        app: pingpongapp
    spec:
      containers:
        - name: pingpong
          image: hinichijou/pingpong_application:wsc2xtuy
          env:
          - name: PORT
            value: "3000"
      securityContext:
        fsGroup: 1001