apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # Claims can have a namespace i.e. persistent volumes can be claimed from multiple namespaces
  namespace: exercises
  name: log-output-claim # name of the volume claim, this will be used in the deployment
spec:
  storageClassName: sc-log-output-pv # this is the name of the persistent volume we are claiming
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi