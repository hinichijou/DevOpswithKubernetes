apiVersion: apps/v1
kind: Deployment
metadata:
  name: todoapp-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todoapp
  template:
    metadata:
      labels:
        app: todoapp
    spec:
      volumes: # Define volume
        - name: todoapp
          persistentVolumeClaim:
            claimName: todoapp-claim
      containers:
        - name: todoapp-frontend
          image: hinichijou/todo_app_frontend:w26rn9ex
          volumeMounts: # Mount volume
            - name: todoapp
              mountPath: /usr/src/app/public/images
        - name: todoapp-backend
          image: hinichijou/todo_app_backend:wdgbn2fi
      securityContext:
        fsGroup: 1001

